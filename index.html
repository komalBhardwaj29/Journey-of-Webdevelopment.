<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Form Elements.</title>
</head>

<body>

    <form>
        <h1>Form Elements.</h1>

        <label>
        Password:
        <input type="Password" placeholder="Password"/>
        </label>
        <br>
        <label>
        Select Date:
        <input type="time"/>
        </label>
        <br>
        <label>
        Color type:
        <input type="color"/>
        </label>
        <br>
        <label>
        <input type="date"/>
        </label>
        <br>

        <label for="cat name">enter your catname</label>
        
        
    </form>
</body>
</html>
