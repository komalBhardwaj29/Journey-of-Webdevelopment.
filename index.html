<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specificity in Css</title>
    <style>
        .yellow{
            color:yellow;
            background-color: red;
        }
        .cred{
            color:crimson;
        }
        .cpurple{
            color:purple;
        }
        .cred{
            color:cyan;
            background-color:black;
        }
        /* when you write same class name then the last one will be applied */
       [ data-x="a"]{
            color:green;
        }
        
    </style>
</head>
<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
    </div>
</body>
</html>
